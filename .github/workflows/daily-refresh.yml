name: Daily Analysis Refresh

on:
  schedule:
    # 15:00 UTC = 11:00 America/New_York during EDT (Mar–Nov)
    # During EST (Nov–Mar) this fires at 10:00 ET — closest single-cron option.
    - cron: '0 15 * * *'
    # Monday 09:00 UTC = 5:00 America/New_York during EDT — picks up the new card
    # for the upcoming week. (During EST this fires at 4:00 ET.)
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run cache refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/refresh_cache.py

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/analyses.json
          git diff --cached --quiet || git commit -m "chore: daily analysis refresh"
          git push
